name: Deploy Cloudflare Pages (branch mapping)

on:
  push:
    branches: [ master, main, bela, sao, vila ]
  workflow_dispatch:
    inputs:
      project:
        description: 'Which Pages project to deploy (bela, sao, vila, all)'
        required: false
        default: 'all'

jobs:
  build-and-deploy:
    name: Build and deploy Pages per-branch
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Deploy Bela
        if: github.ref == 'refs/heads/bela'
        run: |
          cd frontend
          npm run deploy:pages:bela
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Deploy Sao Matheus
        if: github.ref == 'refs/heads/sao'
        run: |
          cd frontend
          npm run deploy:pages:sao
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ALLOW_NON_BELA_DEPLOY: '1'

      - name: Deploy Vila
        if: github.ref == 'refs/heads/vila'
        run: |
          cd frontend
          npm run deploy:pages:vila
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ALLOW_NON_BELA_DEPLOY: '1'

      - name: Deploy All
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        run: |
          cd frontend
          npm run deploy:pages:all
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ALLOW_NON_BELA_DEPLOY: '1'

      - name: Manual dispatch handler
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd frontend
          PROJECT="${{ github.event.inputs.project || 'all' }}"
          echo "Requested deploy project: $PROJECT"
          case "$PROJECT" in
            bela)
              npm run deploy:pages:bela
              ;;
            sao)
              npm run deploy:pages:sao
              ;;
            vila)
              npm run deploy:pages:vila
              ;;
            all)
              npm run deploy:pages:all
              ;;
            *)
              echo "Unknown project '$PROJECT' - valid options: bela,sao,vila,all"
              exit 1
              ;;
          esac
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ALLOW_NON_BELA_DEPLOY: '1'
